name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@polr-software"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test:unit

      - name: Build
        run: bun run build

      - name: Publish @polr-software/checkout
        working-directory: packages/polr-checkout/dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish

      - name: Publish @polr-software/przelewy24
        working-directory: packages/przelewy24/dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
